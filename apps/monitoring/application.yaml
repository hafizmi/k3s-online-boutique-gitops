apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/yourusername/k3s-online-boutique-gitops.git
    targetRevision: main
    path: apps/monitoring
    helm:
      valueFiles:
        - values/prometheus-values.yaml
        - values/loki-values.yaml
        - values/grafana-values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true